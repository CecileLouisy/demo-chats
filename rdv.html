<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes rendez-vous — Refuge Animalier</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── CALENDAR LAYOUT ── */
    .rdv-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 800px) { .rdv-layout { grid-template-columns: 1fr; } }

    /* ── MONTH HEADER ── */
    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .calendar-month {
      font-size: 1.2rem;
      font-weight: 900;
      font-family: 'Lora', serif;
      color: var(--text);
      text-transform: capitalize;
    }
    .btn-nav {
      background: var(--gray-soft);
      border: 1.5px solid var(--gray-border);
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 7px 13px;
      font-size: .9rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-nav:hover { border-color: var(--green); color: var(--green); }

    /* ── CALENDAR GRID ── */
    .calendar-grid {
      background: white;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--green-bg);
      border-bottom: 1.5px solid var(--gray-border);
    }
    .cal-weekday {
      text-align: center;
      padding: 10px 4px;
      font-size: .72rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
    }
    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .cal-day {
      min-height: 80px;
      padding: 8px 6px;
      border-right: 1px solid var(--green-lighter);
      border-bottom: 1px solid var(--green-lighter);
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }
    .cal-day:hover { background: var(--green-bg2); }
    .cal-day.other-month { opacity: .35; }
    .cal-day.today .day-num {
      background: var(--green);
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-day.has-rdv::after {
      content: '';
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
    }
    .day-num {
      font-size: .85rem;
      font-weight: 700;
      color: var(--text);
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .day-rdv-list { margin-top: 4px; }
    .day-rdv-item {
      font-size: .68rem;
      background: var(--green-lighter);
      color: var(--green-darker);
      border-radius: 4px;
      padding: 2px 5px;
      margin-bottom: 2px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── RDV LIST ── */
    .rdv-card {
      background: white;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .rdv-card-header {
      background: var(--green-bg);
      padding: 14px 18px;
      font-size: .82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      border-bottom: 1.5px solid var(--gray-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rdv-item {
      display: flex;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--green-lighter);
      align-items: center;
      transition: background .15s;
      cursor: pointer;
    }
    .rdv-item:last-child { border-bottom: none; }
    .rdv-item:hover { background: var(--green-bg2); }
    .rdv-time {
      font-size: .88rem;
      font-weight: 900;
      color: var(--green-dark);
      min-width: 44px;
    }
    .rdv-info { flex: 1; }
    .rdv-cat-name { font-weight: 800; font-size: .95rem; }
    .rdv-desc { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
    .rdv-cat-img {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--green-light);
    }

    /* ── ADD RDV BTN ── */
    .btn-add-rdv {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      background: var(--gray-soft);
      border: 1.5px dashed var(--gray-border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-family: 'Nunito', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
      margin-top: 14px;
      justify-content: center;
    }
    .btn-add-rdv:hover { border-color: var(--green); color: var(--green-dark); background: var(--green-bg2); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(45,74,62,.45);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: white;
      border-radius: var(--radius-xl);
      padding: 28px 32px;
      width: 420px;
      max-width: 90vw;
      box-shadow: var(--shadow-lg);
      transform: scale(.95);
      transition: transform .25s cubic-bezier(.34,1.4,.64,1);
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-title {
      font-size: 1rem;
      font-weight: 900;
      margin-bottom: 20px;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
    .btn-close-modal {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-muted);
      float: right;
      line-height: 1;
      transition: color .2s;
    }
    .btn-close-modal:hover { color: var(--danger); }
  </style>
</head>
<body>
  <div class="paws-bg" id="pawsBg"></div>
  <div class="deco-cats">🐱🐱🐱🐱</div>
  <div class="toast" id="toast"></div>

  <header class="header" id="appHeader"></header>
  <nav class="navbar" id="appNav"></nav>

  <main class="main fade-in">
    <div class="rdv-layout">
      <!-- CALENDAR -->
      <div>
        <div class="calendar-header">
          <button class="btn-nav" id="prevMonth">←</button>
          <span class="calendar-month" id="calMonth"></span>
          <button class="btn-nav" id="nextMonth">→</button>
        </div>
        <div class="calendar-grid">
          <div class="cal-weekdays">
            <div class="cal-weekday">Lun</div>
            <div class="cal-weekday">Mar</div>
            <div class="cal-weekday">Mer</div>
            <div class="cal-weekday">Jeu</div>
            <div class="cal-weekday">Ven</div>
            <div class="cal-weekday">Sam</div>
            <div class="cal-weekday">Dim</div>
          </div>
          <div class="cal-days" id="calDays"></div>
        </div>
      </div>

      <!-- RDV LIST -->
      <div>
        <div class="rdv-card">
          <div class="rdv-card-header">
            <span>Prochains rendez-vous</span>
            <span id="rdvCount" style="color:var(--green-dark)"></span>
          </div>
          <div id="rdvList"></div>
        </div>
        <button class="btn-add-rdv" id="btnAddRdv">+ Ajouter un rendez-vous</button>
      </div>
    </div>
  </main>

  <!-- ADD RDV MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="btn-close-modal" id="closeModal">×</button>
      <div class="modal-title">Nouveau rendez-vous</div>
      <div class="form-group">
        <label>Chat concerné</label>
        <select id="rdvCat"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="rdvDate" />
        </div>
        <div class="form-group">
          <label>Heure</label>
          <input type="time" id="rdvTime" value="10:00" />
        </div>
      </div>
      <div class="form-group">
        <label>Motif</label>
        <select id="rdvMotif">
          <option>Visite vétérinaire</option>
          <option>Visite d'adoption</option>
          <option>Vaccination</option>
          <option>Stérilisation</option>
          <option>Bilan de santé</option>
          <option>Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note (optionnel)</label>
        <input type="text" id="rdvNote" placeholder="Ex : Rappel vaccin obligatoire" />
      </div>
      <div class="modal-actions">
        <button class="btn-primary" id="saveRdv">Enregistrer</button>
        <button class="btn-secondary" id="cancelRdv">Annuler</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    requireAuth();
    injectHeader('rdv');
    initPaws();

    // ── MOCK RDV DATA ─────────────────────────────────────────────
    const today = new Date();
    let rdvList = [
      {
        id: 1, catId: 1, date: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 2),
        time: '10:00', motif: 'Visite vétérinaire', note: 'Contrôle annuel'
      },
      {
        id: 2, catId: 3, date: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 2),
        time: '14:30', motif: "Visite d'adoption", note: 'Famille Leroy'
      },
      {
        id: 3, catId: 6, date: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 5),
        time: '09:00', motif: 'Vaccination', note: 'Première vaccination'
      },
      {
        id: 4, catId: 2, date: new Date(today.getFullYear(), today.getMonth(), today.getDate() + 8),
        time: '11:00', motif: 'Stérilisation', note: ''
      }
    ];
    let nextId = 5;

    // ── CALENDAR STATE ────────────────────────────────────────────
    let currentYear  = today.getFullYear();
    let currentMonth = today.getMonth();

    function renderCalendar() {
      const months = ['Janvier','Février','Mars','Avril','Mai','Juin',
                      'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
      document.getElementById('calMonth').textContent =
        `${months[currentMonth]} ${currentYear}`;

      const firstDay = new Date(currentYear, currentMonth, 1);
      const lastDay  = new Date(currentYear, currentMonth + 1, 0);
      let startDow   = firstDay.getDay(); // 0=Sun
      startDow = startDow === 0 ? 6 : startDow - 1; // Monday-based

      const grid = document.getElementById('calDays');
      grid.innerHTML = '';

      const prevLast = new Date(currentYear, currentMonth, 0).getDate();

      for (let i = startDow - 1; i >= 0; i--) {
        const d = document.createElement('div');
        d.className = 'cal-day other-month';
        d.innerHTML = `<div class="day-num">${prevLast - i}</div>`;
        grid.appendChild(d);
      }

      for (let d = 1; d <= lastDay.getDate(); d++) {
        const cell  = document.createElement('div');
        const isToday = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
        const dayRdvs = rdvList.filter(r =>
          r.date.getDate() === d &&
          r.date.getMonth() === currentMonth &&
          r.date.getFullYear() === currentYear
        );
        cell.className = `cal-day${isToday?' today':''}${dayRdvs.length?' has-rdv':''}`;
        let rdvHtml = dayRdvs.slice(0,2).map(r => {
          const cat = CATS_DATA.find(c => c.id === r.catId);
          return `<div class="day-rdv-item">${r.time} ${cat?.nom || '?'}</div>`;
        }).join('');
        cell.innerHTML = `<div class="day-num">${d}</div><div class="day-rdv-list">${rdvHtml}</div>`;
        grid.appendChild(cell);
      }

      // Fill rest
      const total = startDow + lastDay.getDate();
      const rest  = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (let i = 1; i <= rest; i++) {
        const d = document.createElement('div');
        d.className = 'cal-day other-month';
        d.innerHTML = `<div class="day-num">${i}</div>`;
        grid.appendChild(d);
      }
    }

    // ── RDV LIST ──────────────────────────────────────────────────
    function renderRdvList() {
      const container = document.getElementById('rdvList');
      const sorted = [...rdvList].sort((a,b) => a.date - b.date || a.time.localeCompare(b.time));
      const upcoming = sorted.filter(r => r.date >= new Date(today.toDateString()));

      document.getElementById('rdvCount').textContent = `${upcoming.length} à venir`;

      if (upcoming.length === 0) {
        container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:.88rem;font-style:italic;font-family:'Lora',serif;">Aucun rendez-vous à venir.</div>`;
        return;
      }

      container.innerHTML = upcoming.map(r => {
        const cat = CATS_DATA.find(c => c.id === r.catId);
        const dateStr = r.date.toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
        return `
          <div class="rdv-item" data-id="${r.id}">
            <img class="rdv-cat-img" src="${cat?.photo || ''}" alt="${cat?.nom}" />
            <div class="rdv-info">
              <div class="rdv-cat-name">${cat?.nom || '?'} — ${r.motif}</div>
              <div class="rdv-desc">📅 ${dateStr} à ${r.time}${r.note ? ' · ' + r.note : ''}</div>
            </div>
            <button class="btn-icon" onclick="deleteRdv(${r.id})" title="Supprimer">🗑️</button>
          </div>
        `;
      }).join('');
    }

    function deleteRdv(id) {
      rdvList = rdvList.filter(r => r.id !== id);
      renderCalendar();
      renderRdvList();
      showToast('🗑️ Rendez-vous supprimé.');
    }

    // ── NAVIGATION ────────────────────────────────────────────────
    document.getElementById('prevMonth').addEventListener('click', () => {
      if (currentMonth === 0) { currentMonth = 11; currentYear--; }
      else currentMonth--;
      renderCalendar();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      if (currentMonth === 11) { currentMonth = 0; currentYear++; }
      else currentMonth++;
      renderCalendar();
    });

    // ── MODAL ─────────────────────────────────────────────────────
    const modal   = document.getElementById('modalOverlay');
    const rdvDate = document.getElementById('rdvDate');

    function openModal() {
      // Populate cat select
      const sel = document.getElementById('rdvCat');
      sel.innerHTML = CATS_DATA.map(c => `<option value="${c.id}">${c.nom}</option>`).join('');
      // Default date = today
      rdvDate.value = today.toISOString().split('T')[0];
      modal.classList.add('open');
    }
    function closeModal() { modal.classList.remove('open'); }

    document.getElementById('btnAddRdv').addEventListener('click', openModal);
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelRdv').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    document.getElementById('saveRdv').addEventListener('click', () => {
      const catId = parseInt(document.getElementById('rdvCat').value);
      const date  = rdvDate.value;
      const time  = document.getElementById('rdvTime').value;
      const motif = document.getElementById('rdvMotif').value;
      const note  = document.getElementById('rdvNote').value;

      if (!date) { showToast('⚠️ Veuillez choisir une date.'); return; }

      rdvList.push({
        id: nextId++, catId,
        date: new Date(date + 'T00:00:00'),
        time, motif, note
      });

      closeModal();
      renderCalendar();
      renderRdvList();
      const cat = CATS_DATA.find(c => c.id === catId);
      showToast(`✅ Rendez-vous ajouté pour ${cat?.nom} !`);
    });

    // ── INIT ──────────────────────────────────────────────────────
    renderCalendar();
    renderRdvList();
  </script>
</body>
</html>
