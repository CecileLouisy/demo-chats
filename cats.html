<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tous les chats — Refuge Animalier</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── SEARCH / FILTER BAR ── */
    .filters {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .filter-group { display: flex; flex-direction: column; }
    .filter-group label { margin-top: 0; }
    .filter-group input,
    .filter-group select { width: 220px; }

    .filter-count {
      margin-left: auto;
      font-size: .82rem;
      font-weight: 700;
      color: var(--text-muted);
      align-self: flex-end;
      padding-bottom: 10px;
    }

    /* ── GRID ── */
    .cats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 24px;
    }

    /* ── CAT CARD ── */
    .cat-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--gray-border);
      cursor: pointer;
      transition: transform .25s cubic-bezier(.34,1.3,.64,1), box-shadow .25s;
      animation: fadeIn .4s ease forwards;
      opacity: 0;
    }
    .cat-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: var(--shadow-lg);
    }

    .cat-card-img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }
    .cat-card:hover .cat-card-img { transform: scale(1.04); }

    .cat-card-img-wrap {
      overflow: hidden;
      position: relative;
    }
    .cat-card-status {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .cat-card-body {
      padding: 13px 14px 14px;
    }
    .cat-card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .cat-card-name {
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--text);
    }
    .cat-card-age {
      font-size: .8rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .cat-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .btn-details {
      background: var(--green-lighter);
      color: var(--green-darker);
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: .73rem;
      font-weight: 800;
      letter-spacing: .6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn-details:hover {
      background: var(--green);
      color: white;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 600;
      display: none;
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="paws-bg" id="pawsBg"></div>
  <div class="deco-cats">🐱🐱🐱🐱</div>
  <div class="toast" id="toast"></div>

  <!-- HEADER -->
  <header class="header" id="appHeader"></header>

  <!-- NAV -->
  <nav class="navbar" id="appNav"></nav>

  <!-- MAIN -->
  <main class="main fade-in">
    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label for="searchInput">🔍 Rechercher</label>
        <input type="text" id="searchInput" placeholder="Nom du chat…" />
      </div>
      <div class="filter-group">
        <label for="filterStatut">Filtrer par statut</label>
        <select id="filterStatut">
          <option value="">Tous les statuts</option>
          <option value="disponible">Disponible</option>
          <option value="réservé">Réservé</option>
          <option value="adopté">Adopté</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filterSexe">Sexe</label>
        <select id="filterSexe">
          <option value="">Tous</option>
          <option value="M">Mâle</option>
          <option value="F">Femelle</option>
        </select>
      </div>
      <span class="filter-count" id="filterCount"></span>
    </div>

    <!-- Grid -->
    <div class="cats-grid" id="catsGrid"></div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="emoji">🐾</div>
      Aucun chat ne correspond à votre recherche.
    </div>
  </main>

  <script src="js/data.js"></script>
  <script>
    requireAuth();
    injectHeader('cats');
    initPaws();

    // ── RENDER ──────────────────────────────────────────────────
    function render() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const statut = document.getElementById('filterStatut').value;
      const sexe   = document.getElementById('filterSexe').value;
      const grid   = document.getElementById('catsGrid');
      const empty  = document.getElementById('emptyState');

      const filtered = CATS_DATA.filter(cat => {
        const matchName   = cat.nom.toLowerCase().includes(search);
        const matchStatut = !statut || cat.statut === statut;
        const matchSexe   = !sexe   || cat.sexe === sexe;
        return matchName && matchStatut && matchSexe;
      });

      document.getElementById('filterCount').textContent =
        `${filtered.length} chat${filtered.length > 1 ? 's' : ''}`;

      grid.innerHTML = '';

      if (filtered.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      filtered.forEach((cat, i) => {
        const card = document.createElement('div');
        card.className = 'cat-card';
        card.style.animationDelay = `${i * 60}ms`;
        card.innerHTML = `
          <div class="cat-card-img-wrap">
            <img class="cat-card-img" src="${cat.photo}" alt="${cat.nom}" loading="lazy" />
            <div class="cat-card-status">${statusBadge(cat.statut)}</div>
          </div>
          <div class="cat-card-body">
            <div class="cat-card-top">
              <span class="cat-card-name">${cat.nom}</span>
              <span class="cat-card-age">${cat.age}</span>
            </div>
            <div class="cat-card-footer">
              ${sexeIcon(cat.sexe)}
              <button class="btn-details">Détails</button>
            </div>
          </div>
        `;
        card.addEventListener('click', () => goToDetail(cat.id));
        grid.appendChild(card);
      });
    }

    function goToDetail(id) {
      window.location.href = `detail.html?id=${id}`;
    }

    // ── LISTENERS ───────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('filterStatut').addEventListener('change', render);
    document.getElementById('filterSexe').addEventListener('change', render);

    render();
  </script>
</body>
</html>
